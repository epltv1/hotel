<!DOCTYPE html>
<html>
<head>
    <title>Embed Server</title>
    <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #000; color: #fff; }
        #dashboard { display: block; max-width: 600px; margin: auto; }
        #player-wrapper { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="dashboard">
    <h1>Embed Generator</h1>
    <input type="text" id="title" placeholder="Title for reference">
    <input type="text" id="m3u8" placeholder="Paste M3U8 Link">
    <button onclick="saveLink()">Generate Embed URL</button>
    <div id="embedList"></div>
</div>

<div id="player-wrapper"><div id="player"></div></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id');

    // 1. PLAYER MODE: If ID exists, hide dashboard and play video
    if (videoId) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('player-wrapper').style.display = 'block';
        
        // Fetch your shared links from your GitHub repository
        fetch('links.json')
            .then(res => res.json())
            .then(data => {
                const entry = data.find(item => item.id === videoId);
                if (entry) {
                    jwplayer("player").setup({
                        file: entry.url,
                        width: "100%",
                        height: "100%",
                        autostart: true
                    });
                } else {
                    document.body.innerHTML = "<h1>Video not found</h1>";
                }
            });
    }

    // 2. DASHBOARD MODE: Functions to help you manage links
    function saveLink() {
        const title = document.getElementById('title').value;
        const url = document.getElementById('m3u8').value;
        const id = Math.random().toString(36).substring(7);
        alert("Copy this to your links.json file:\n\n{ \"title\": \"" + title + "\", \"id\": \"" + id + "\", \"url\": \"" + url + "\" }");
    }
</script>
</body>
</html>
